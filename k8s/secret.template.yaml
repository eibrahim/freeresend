apiVersion: v1
kind: Secret
metadata:
  name: freeresend-secrets
  namespace: freeresend
type: Opaque
stringData:
  NEXTAUTH_URL: "https://www.freeresend.com"
  NEXTAUTH_SECRET: "your-nextauth-secret-key-here"
  DATABASE_URL: "postgresql://username:password@host:port/database"
  AWS_REGION: "us-east-1"
  AWS_ACCESS_KEY_ID: "your-aws-access-key-id"
  AWS_SECRET_ACCESS_KEY: "your-aws-secret-access-key"
  DO_API_TOKEN: "your-digital-ocean-api-token-here"
  ADMIN_EMAIL: "your-admin-email@example.com"
  ADMIN_PASSWORD: "your-admin-password-here"
  # Pull-based stats API key (existing /api/stats route, kept for backwards compat)
  STATS_API_KEY: "your-stats-api-key-here"
  # Push-based stats reporting to EC Dashboard (nightly CronJob -> /api/cron/report-stats)
  CRON_SECRET: "your-cron-secret-here"
  STATS_DASHBOARD_URL: "https://dashboard.hub.elitecoders.ai"
  STATS_APP_SLUG: "freeresend"
  STATS_PUSH_SECRET: "your-plaintext-push-secret-here"
  # Umami audience metrics (optional - helpers return [] if unset)
  UMAMI_API_URL: "https://analytics.hub.elitecoders.ai"
  UMAMI_USERNAME: "stats"
  UMAMI_PASSWORD: "your-umami-stats-password-here"
  UMAMI_WEBSITE_ID: "your-umami-website-uuid-here"